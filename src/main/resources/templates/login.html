<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            color: gold;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px;
            width: 100%;
            background: gold;
            color: black;
            border: none;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <form action="/login-ui" method="post">
        <input type="text" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p style="margin-top:15px; color: gold;">
            Don't have an account?
        </p>

        <a href="/register-ui" style="
    display:block;
    margin-top:10px;
    padding:10px;
    background:black;
    color:gold;
    border:1px solid gold;
    text-decoration:none;
    border-radius:6px;
">
            Register
        </a>
    </form>
</div>

</body>
</html>
