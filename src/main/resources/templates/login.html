<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .link {
            margin-top: 15px;
            display: block;
        }

        .link a {
            text-decoration: none;
            color: #007bff;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>🔐 Login</h2>

    <!-- ❗ ERROR MESSAGE -->
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form action="/login-ui" method="post">
        <input type="text" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />

        <button type="submit">Login</button>
    </form>

    <!-- ✅ REGISTER LINK -->
    <div class="link">
        <p>Don't have an account?</p>
        <a href="/register-ui">Create Account</a>
    </div>

</div>

</body>
</html>
