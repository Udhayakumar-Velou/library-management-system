<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            background: black;
            color: gold;
            font-family: 'Segoe UI';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            border: 1px solid gold;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: gold;
            color: black;
            border: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Register</h2>

    <form action="/register-ui" method="post">
        <input type="text" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />

        <!-- ❌ NO ROLE FIELD -->

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
