<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            background: black;
            color: gold;
            font-family: 'Segoe UI';
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #111;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            border: 1px solid gold;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: gold;
            color: black;
            border: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Register</h2>

    <form th:action="@{/register-ui}" th:object="${user}" method="post">

        <input type="email" th:field="*{email}" placeholder="Email" />

        <div style="color:red" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>

        <input type="password" th:field="*{password}" placeholder="Password" />

        <div style="color:red" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
