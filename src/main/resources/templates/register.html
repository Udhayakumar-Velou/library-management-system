<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #43cea2, #185a9d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Register</h2>

    <form action="/register-ui" method="post">
        <input type="text" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />

        <!-- 🔥 ROLE SELECTION -->
        <select name="role">
            <option value="USER">User</option>
<!--            <option value="ADMIN">Admin</option>-->
        </select>

        <button type="submit">Register</button>
    </form>

    <p><a href="/login-ui">Already have account? Login</a></p>
</div>

</body>
</html>
