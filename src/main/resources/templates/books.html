<!DOCTYPE html>
<html>
<head>
    <title>Library App</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0b0b;
            color: white;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: #000;
            border-bottom: 1px solid gold;
        }

        .nav-left a {
            color: gold;
            margin-right: 25px;
            text-decoration: none;
            font-weight: 600;
        }

        .nav-right {
            color: gold;
            font-weight: 600;
        }

        /* CONTAINER */
        .container {
            max-width: 850px;
            margin: 50px auto;
        }

        h2 {
            color: gold;
        }

        /* SEARCH */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid gold;
            background: #111;
            color: white;
        }

        .search-bar button {
            background: gold;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* CARD */
        .card {
            background: #111;
            border: 1px solid rgba(255,215,0,0.2);
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 14px;
        }

        .book-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .book-title {
            font-size: 16px;
        }

        /* BUTTONS */
        .btn {
            padding: 7px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .borrow-btn {
            background: gold;
            color: black;
        }

        .delete-btn {
            background: #ff3b3b;
            color: white;
        }

        .edit-btn {
            background: orange;
            color: black;
        }

        .add-btn {
            background: transparent;
            border: 1px solid gold;
            color: gold;
        }

        /* EDIT SECTION */
        .edit-form {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .edit-form input {
            padding: 6px;
            border-radius: 6px;
            border: none;
            background: #222;
            color: white;
            width: 120px;
        }

        /* ADD BOOK */
        .add-box {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .add-box input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #222;
            color: white;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        <a href="/">Home</a>
        <a href="/books-ui">Books</a>
        <a th:if="${role == 'ADMIN'}" href="/borrow-ui">Requests</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="nav-right">
        👤 <span th:text="${userEmail}"></span> (<span th:text="${role}"></span>)
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <h2>📚 Book Collection</h2>

    <!-- SEARCH -->
    <form method="get" action="/books-ui" class="search-bar">
        <input type="text" name="keyword" placeholder="Search books..." />
        <button>Search</button>
    </form>

    <!-- BOOK LIST -->
    <div th:each="book : ${books}" class="card">

        <!-- TOP ROW -->
        <div class="book-row">

            <div class="book-title">
                <strong th:text="${book.title}"></strong> -
                <span th:text="${book.author}"></span>
            </div>

            <div>

                <!-- USER ONLY -->
                <div th:if="${role == 'USER'}" style="display:inline;">
                    <form th:action="@{'/books-ui/borrow/' + ${book.id}}" method="post">
                        <button class="btn borrow-btn">Borrow</button>
                    </form>
                </div>

                <!-- ADMIN ONLY -->
                <div th:if="${role == 'ADMIN'}" style="display:inline;">

                    <form th:action="@{'/books-ui/delete/' + ${book.id}}" method="post" style="display:inline;">
                        <button class="btn delete-btn">Delete</button>
                    </form>

                </div>

            </div>

        </div>

        <!-- EDIT FORM (ADMIN ONLY) -->
        <div th:if="${role == 'ADMIN'}" class="edit-form">

            <form th:action="@{'/books-ui/update/' + ${book.id}}" method="post">

                <input type="text" name="title" placeholder="New Title" required />
                <input type="text" name="author" placeholder="New Author" required />

                <button class="btn edit-btn">Update</button>

            </form>

        </div>

    </div>

    <!-- ADD BOOK -->
    <div th:if="${role == 'ADMIN'}" class="card add-box">

        <form action="/books-ui/add" method="post">

            <input type="text" name="title" placeholder="Title" required />
            <input type="text" name="author" placeholder="Author" required />

            <button class="btn add-btn">Add Book</button>

        </form>

    </div>

</div>

</body>
</html>
