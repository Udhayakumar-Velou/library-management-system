<!DOCTYPE html>
<html>
<head>
    <title>Library App</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #0f0f0f;
            color: white;
            margin: 0;
        }

        .navbar {
            background: black;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid gold;
        }

        .nav-left a {
            color: gold;
            margin-right: 20px;
            text-decoration: none;
        }

        .nav-right {
            color: gold;
        }

        .container {
            text-align: center;
            margin-top: 100px;
        }

        .btn {
            display: block;
            margin: 15px auto;
            padding: 12px;
            width: 200px;
            background: gold;
            color: black;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="nav-left">
        <a href="/">Home</a>
        <a href="/books-ui">Books</a>
        <a th:if="${role == 'ADMIN'}" href="/borrow-ui">Requests</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="nav-right">
        👤 <span th:text="${userEmail}"></span>
        (<span th:text="${role}"></span>)
    </div>
</div>

<div class="container">
    <h1>📚 Library System</h1>

    <a href="/books-ui" class="btn">Books</a>
    <a th:if="${role == 'ADMIN'}" href="/borrow-ui" class="btn">Requests</a>
</div>

</body>
</html>
